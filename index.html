<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Peta Wisata Probolinggo Modern</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
}

/* MAP */
#map{
height:480px;
width:100%;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* CONTAINER */
.container{
padding:15px;
}

/* TITLE */
h3{
margin:15px 0;
color:#2c3e50;
}

/* CARD GRID */
.card-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
}

/* CARD MODERN */
.card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
transition:0.3s;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

/* IMAGE */
.card img{
width:100%;
height:170px;
object-fit:cover;
}

/* BODY */
.card-body{
padding:12px;
}

/* NAME */
.card h3{
margin:0;
font-size:17px;
color:#1f2d3d;
}

/* TEXT */
.card p{
font-size:12px;
color:#555;
margin:6px 0;
}

/* BADGE */
.badge{
position:absolute;
top:10px;
left:10px;
background:#3498db;
color:white;
padding:4px 8px;
font-size:11px;
border-radius:8px;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:8px;
padding:8px 10px;
background:linear-gradient(45deg,#3498db,#2ecc71);
color:white;
text-decoration:none;
border-radius:8px;
font-size:12px;
transition:0.3s;
}

.btn:hover{
opacity:0.85;
transform:scale(1.05);
}
</style>
</head>

<body>

<div id="map"></div>

<div class="container">
<h3>📍 Wisata Probolinggo</h3>
<div class="card-grid" id="cards"></div>
</div>

<script>

// ================= MAP =================
var map = L.map('map').setView([-7.75, 113.22], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'&copy; OpenStreetMap'
}).addTo(map);

// ================= SHEET =================
const sheetURL =
"https://docs.google.com/spreadsheets/d/1_WrQNaUU7ls2JyLTlO_DeEwmpw75t_XHd5QpkbxP-J0/gviz/tq?tqx=out:csv";

// ================= CSV PARSER =================
function parseCSV(text){
let lines = text.trim().split("\n");
return lines.map(line=>{
let res=[],cur="",q=false;
for(let c of line){
if(c=='"') q=!q;
else if(c==','&&!q){res.push(cur);cur="";}
else cur+=c;
}
res.push(cur);
return res;
});
}

// ================= LOAD DATA =================
fetch(sheetURL)
.then(r=>r.text())
.then(text=>{

let rows = parseCSV(text);
let cards = document.getElementById("cards");
let bounds = [];

for(let i=1;i<rows.length;i++){

let r = rows[i];
if(!r || r.length < 7) continue;

let id = r[0];
let nama = r[1];
let alamat = r[2];
let lat = parseFloat(r[3]);
let lng = parseFloat(r[4]);
let desc = r[5];
let gambar = r[6];
let virtual = r[7] || "#";

if(isNaN(lat)||isNaN(lng)) continue;

bounds.push([lat,lng]);

// ================= MARKER =================
L.marker([lat,lng]).addTo(map)
.bindPopup(`
<b>${nama}</b><br>
${alamat}<br>
<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">📍 Buka Lokasi</a>
`);

// ================= CARD =================
cards.innerHTML += `
<div class="card">
<span class="badge">ID: ${id}</span>
<img src="${gambar}" onerror="this.src='https://via.placeholder.com/300x200'">
<div class="card-body">
<h3>${nama}</h3>
<p>📍 ${alamat}</p>
<p>${desc}</p>

<a class="btn"
href="https://www.google.com/maps?q=${lat},${lng}"
target="_blank">
📌 Lihat Lokasi
</a>

</div>
</div>
`;
}

// AUTO ZOOM
if(bounds.length>0){
map.fitBounds(bounds);
}

})
.catch(err=>{
console.error(err);
alert("Gagal load data Google Sheets");
});

</script>

</body>
</html>
